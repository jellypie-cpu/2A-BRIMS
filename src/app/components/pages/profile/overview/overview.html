<div class="profile-overview">

  <!-- PROFILE -->
  <div class="header">

    <img [src]="profileImage || 'assets/default-avatar.png'" />

    <h2>{{ user?.username }}</h2>
    <p>{{ user?.email }}</p>

  </div>

  <hr />

  <!-- ACTIVITY LOGS -->
  <h3>Activity Logs</h3>

  <div *ngFor="let log of logs">
    <p>{{ log.action }}</p>
    <small>{{ log.createdAt?.toDate() | date:'short' }}</small>
  </div>

</div>
