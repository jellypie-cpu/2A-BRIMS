  <div class="archive-container">

    <h2>Archived Residents</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Zone</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of archivedResidents">
          <td>{{ r.id }}</td>
          <td>{{ r.fullname }}</td>
          <td>{{ r.address?.zone }}</td>

          <td>
            <button (click)="restore(r)">
              Restore
            </button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
