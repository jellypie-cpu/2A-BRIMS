<div class="modal" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <h2>
      {{ isEditMode ? (residentData ? 'Edit Resident' : 'Add Resident') : 'Resident Details' }}
    </h2>

    <form (ngSubmit)="onSubmit()" #residentForm="ngForm">

      <!-- FULL NAME -->
      <label>Full Name</label>
      <input
        type="text"
        [(ngModel)]="resident.fullname"
        name="fullname"
        [disabled]="!isEditMode"
        required
      />

      <!-- BIRTHDATE -->
      <label>Birthdate</label>
      <input
        type="date"
        [(ngModel)]="resident.birthdate"
        name="birthdate"
        [disabled]="!isEditMode"
        required
      />

      <!-- CIVIL STATUS -->
      <label>Civil Status</label>
      <select
        [(ngModel)]="resident.civilStatus"
        name="civilStatus"
        [disabled]="!isEditMode"
        required
      >
        <option value="">Select status</option>
        <option value="Single">Single</option>
        <option value="Married">Married</option>
        <option value="Widowed">Widowed</option>
      </select>

      <h3>Address</h3>

      <!-- ZONE -->
      <label>Zone</label>
      <select
        [(ngModel)]="resident.address.zone"
        name="zone"
        [disabled]="!isEditMode"
      >
        <option value="">Select Zone</option>
        <option *ngFor="let z of zones" [value]="z">
          Zone {{ z }}
        </option>
      </select>

      <!-- STREET -->
      <label>Street</label>
      <input
        type="text"
        [(ngModel)]="resident.address.street"
        name="street"
        [disabled]="!isEditMode"
      />

      <!-- BARANGAY -->
      <label>Barangay</label>
      <input
        type="text"
        [(ngModel)]="resident.address.barangay"
        name="barangay"
        [disabled]="!isEditMode"
      />

      <!-- PHOTO -->
      <label>Resident Photo</label>

      <input
        type="file"
        accept="image/*"
        (change)="onFileSelected($event)"
        [disabled]="!isEditMode"
      />

      <button type="button" (click)="openCamera()" [disabled]="!isEditMode">
        📸 Take Photo
      </button>

      <!-- PREVIEW -->
      <div *ngIf="resident.photo">
        <img [src]="resident.photo" width="120" />
      </div>

      <!-- BUTTONS -->
      <div class="form-buttons">

        <!-- VIEW MODE BUTTON -->
        <button
          type="button"
          *ngIf="!isEditMode"
          (click)="enableEdit()"
        >
          Edit
        </button>

        <!-- SAVE BUTTON -->
        <button
          type="submit"
          *ngIf="isEditMode"
          [disabled]="residentForm.invalid"
        >
          Save
        </button>

        <!-- CLOSE -->
        <button type="button" (click)="onClose()">
          Close
        </button>

      </div>

    </form>

  </div>
</div>
