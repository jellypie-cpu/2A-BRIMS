<div class="permit-container">
  <div class="permit-page-header">
    <div>
      <h1>Barangay Business Permit</h1>
      <p>Create and print official barangay business permits.</p>
    </div>
  </div>

  <div class="permit-toolbar">
    <input
      type="text"
      placeholder="Search resident..."
      [(ngModel)]="searchText"
      (input)="filterResidents()"
    />
  </div>

  <div class="resident-list">
    <div class="resident-card" *ngFor="let resident of filteredResidents">
      <div class="resident-avatar">
        {{ resident.fullname?.charAt(0) }}
      </div>

      <div class="resident-info">
        <h3>{{ resident.fullname }}</h3>
        <p>Zone {{ resident.address?.zone }}</p>
      </div>

      <button class="create-btn" (click)="openPermit(resident)">
        Create Permit
      </button>
    </div>
  </div>
</div>

<app-barangay-permit-form
  *ngIf="showModal"
  [selectedResident]="selectedResident"
  (close)="closeModal()"
  (save)="savePermit($event)">
</app-barangay-permit-form>
