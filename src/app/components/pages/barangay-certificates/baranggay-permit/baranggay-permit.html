<div class="permit-container">

  <!-- OFFICIAL HEADER -->
  <div class="gov-header">
    <div>
      <h1>Barangay Permit</h1>
      <p>Official Resident Permit Processing Portal</p>
    </div>
  </div>

  <!-- FILTER BAR (SAME STYLE AS CLEARANCE/INDIGENCY) -->
  <div class="filter-bar">

    <input
      type="text"
      placeholder="Search resident name..."
      [(ngModel)]="searchText"
      (input)="filterResidents()"
    />

  </div>

  <!-- RESIDENT GRID (SAME CARD SYSTEM) -->
  <div class="resident-grid">

    <div class="resident-card" *ngFor="let resident of filteredResidents">

      <!-- PHOTO (same system style) -->
      <div class="photo">
        <img
          *ngIf="resident.photo"
          [src]="resident.photo"
        />
        <div *ngIf="!resident.photo" class="placeholder">
          {{ resident.fullname?.charAt(0) }}
        </div>
      </div>

      <!-- DETAILS -->
      <div class="details">

        <h2>{{ resident.fullname }}</h2>

        <p class="meta">
          Zone:
          <span class="badge">Zone {{ resident.address?.zone }}</span>
        </p>

        <p class="meta">
          Address:
          {{ resident.address?.street }}, {{ resident.address?.barangay }}
        </p>

      </div>

      <!-- ACTION BUTTON -->
      <div class="actions">
        <button class="btn-generate" (click)="openPermit(resident)">
          Generate Permit
        </button>
      </div>

    </div>

  </div>

</div>

<!-- MODAL -->
<app-barangay-permit-form
  *ngIf="showModal"
  [selectedResident]="selectedResident"
  (close)="closeModal()"
  (save)="savePermit($event)">
</app-barangay-permit-form>
