<div class="clearance-container">

  <div class="clearance-page-header">
    <div>
      <h1>Barangay Clearance System</h1>
      <p>Official Resident Certification Portal</p>
    </div>
  </div>

  <div class="header-section">

    <div class="zone-select">
      <label>Filter by Zone</label>
      <select [(ngModel)]="selectedZone" (change)="filterResidents()">
        <option value="">All Zones</option>
        <option *ngFor="let zone of zones" [value]="zone">
          Zone {{ zone }}
        </option>
      </select>
    </div>

    <div class="search-resident">
      <label>Search Resident</label>
      <input
        type="text"
        placeholder="Search resident name..."
        [(ngModel)]="searchText"
        (input)="filterResidents()"
      />
    </div>

  </div>

  <div class="resident-list">

    <div class="resident-row" *ngFor="let resident of filteredResidents">

      <div class="resident-avatar">
        <img
          *ngIf="resident.photo"
          [src]="resident.photo"
          alt="resident photo"
        />

        <span *ngIf="!resident.photo">
          {{ resident.fullname?.charAt(0) }}
        </span>
      </div>

      <div class="resident-info">
        <h3>{{ resident.fullname }}</h3>

        <p>
          <strong>Zone:</strong>
          <span class="zone-badge">Zone {{ resident.address?.zone }}</span>
        </p>

        <p>
          <strong>Address:</strong>
          {{ resident.address?.street }}, {{ resident.address?.barangay }}
        </p>
      </div>

      <button
        type="button"
        class="generate-btn"
        (click)="generateClearance(resident)"
      >
        <span class="btn-icon">✓</span>
        Generate Clearance
      </button>

    </div>

  </div>

</div>

<app-baranggay-clearance-form
  *ngIf="showModal"
  [selectedResident]="selectedResident"
  (close)="closePrint()">
</app-baranggay-clearance-form>
