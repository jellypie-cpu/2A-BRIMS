<div class="indigency-container">

  <!-- OFFICIAL HEADER -->
  <div class="gov-header">
    <div>
      <h1>Barangay Indigency</h1>
      <p>Official Resident Assistance Certification Portal</p>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">

    <!-- Zone Filter -->
    <select [(ngModel)]="selectedZone" (change)="filterResidents()">
      <option value="">All Zones</option>
      <option *ngFor="let zone of zones" [value]="zone">
        {{ zone }}
      </option>
    </select>

    <!-- Search -->
    <input
      type="text"
      placeholder="Search resident name..."
      [(ngModel)]="searchText"
      (input)="filterResidents()"
    />

  </div>

  <!-- RESIDENT CARDS -->
  <div class="resident-grid">

    <div class="resident-card" *ngFor="let resident of filteredResidents">

      <!-- PHOTO -->
      <div class="photo">
        <img
          *ngIf="resident.photo"
          [src]="resident.photo"
          alt="resident photo"
        />
        <div *ngIf="!resident.photo" class="placeholder">
          {{ resident.fullname?.charAt(0) }}
        </div>
      </div>

      <!-- DETAILS -->
      <div class="details">

        <h2>{{ resident.fullname }}</h2>

        <p class="meta">
          Zone:
          <span class="badge">Zone {{ resident.address?.zone }}</span>
        </p>

        <p class="meta">
          Address:
          {{ resident.address?.street }}, {{ resident.address?.barangay }}
        </p>

      </div>

      <!-- ACTION BUTTON -->
      <div class="actions">
        <button class="btn-generate" (click)="openIndigency(resident)">
          Generate Indigency
        </button>
      </div>

    </div>

  </div>

</div>

<!-- MODAL -->
<app-barangay-indigency-form
  *ngIf="showModal"
  [selectedResident]="selectedResident"
  (close)="closeModal()">
</app-barangay-indigency-form>
