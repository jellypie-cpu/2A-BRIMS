<div class="indigency-container">

  <div class="indigency-page-header">
    <div>
      <h1>Barangay Indigency</h1>
      <p>Generate official certificate of indigency for registered residents.</p>
    </div>
  </div>

  <div class="header-section">

    <div class="zone-select">
      <label>Select Zone</label>
      <select [(ngModel)]="selectedZone" (change)="filterResidents()">
        <option value="">All Zones</option>
        <option *ngFor="let zone of zones" [value]="zone">
          Zone {{ zone }}
        </option>
      </select>
    </div>

    <div class="search-resident">
      <label>Search Resident</label>
      <input
        type="text"
        placeholder="Search resident by name..."
        [(ngModel)]="searchText"
        (input)="filterResidents()"
      />
    </div>

  </div>

  <div class="resident-list">

    <div class="resident-row" *ngFor="let resident of filteredResidents">

      <div class="resident-avatar">
        {{ resident.fullname?.charAt(0) }}
      </div>

      <div class="resident-info">
        <h3>{{ resident.fullname }}</h3>
        <p>
          Zone {{ resident.address?.zone }}
          <span *ngIf="resident.address?.street">
            • {{ resident.address?.street }}
          </span>
        </p>
      </div>

      <button class="generate-btn" type="button" (click)="generateIndigency(resident)">
        Generate Indigency
      </button>

    </div>

  </div>

</div>

<app-barangay-indigency-form
  *ngIf="showModal"
  [selectedResident]="selectedResident"
  (close)="closeModal()">
</app-barangay-indigency-form>
