<div class="blotter-modal" (click)="onClose()">
  <div class="blotter-modal-content" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Blotter Request</h2>
      <p>Encode official barangay complaint and incident details.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #blotterForm="ngForm">

      <div class="form-grid">

        <div class="form-group">
          <label>Complaint</label>
          <input type="text" [(ngModel)]="blotter.complaint" name="complaint" required />
        </div>

        <div class="form-group">
          <label>Victim(s)</label>
          <input type="text" [(ngModel)]="blotter.victims" name="victims" required />
        </div>

        <div class="form-group">
          <label>Respondent</label>
          <input type="text" [(ngModel)]="blotter.respondent" name="respondent" required />
        </div>

        <div class="form-group">
          <label>Type</label>
          <select [(ngModel)]="blotter.type" name="type" required>
            <option value="">Select Type</option>
            <option value="Civil">Civil</option>
            <option value="Criminal">Criminal</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label>Location</label>
          <input type="text" [(ngModel)]="blotter.location" name="location" required />
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" [(ngModel)]="blotter.date" name="date" required />
        </div>

        <div class="form-group">
          <label>Time</label>
          <input type="time" [(ngModel)]="blotter.time" name="time" required />
        </div>

        <div class="form-group full-width">
          <label>Description</label>
          <textarea [(ngModel)]="blotter.description" name="description"></textarea>
        </div>

      </div>

      <div class="form-buttons">
        <button class="save-btn" type="submit" [disabled]="blotterForm.invalid">
          Save Blotter
        </button>

        <button class="cancel-btn" type="button" (click)="onClose()">
          Cancel
        </button>
      </div>

    </form>

  </div>
</div>
