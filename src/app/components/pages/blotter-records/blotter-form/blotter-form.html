<div class="modal" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <h2>Blotter Request</h2>

    <form (ngSubmit)="onSubmit()" #blotterForm="ngForm">

      <!-- COMPLAINT -->
      <label>Complaint</label>
      <input type="text" [(ngModel)]="blotter.complaint" name="complaint" required />

      <!-- VICTIM -->
      <label>Victim(s)</label>
      <input type="text" [(ngModel)]="blotter.victims" name="victims" required />

      <!-- RESPONDENT -->
      <label>Respondent</label>
      <input type="text" [(ngModel)]="blotter.respondent" name="respondent" required />

      <!-- TYPE -->
      <label>Type</label>
      <select [(ngModel)]="blotter.type" name="type" required>
        <option value="">Select Type</option>
        <option value="Civil">Civil</option>
        <option value="Criminal">Criminal</option>
      </select>

      <!-- LOCATION -->
      <label>Location</label>
      <input type="text" [(ngModel)]="blotter.location" name="location" required />

      <!-- DATE -->
      <label>Date</label>
      <input type="date" [(ngModel)]="blotter.date" name="date" required />

      <!-- TIME -->
      <label>Time</label>
      <input type="time" [(ngModel)]="blotter.time" name="time" required />

      <!-- STATUS -->
      <label>Status</label>
      <select [(ngModel)]="blotter.status" name="status" required>
        <option value="">Select Status</option>
        <option value="Active">Active</option>
        <option value="Settled">Settled</option>
        <option value="Scheduled">Scheduled</option>
      </select>

      <!-- DESCRIPTION -->
      <label>Description</label>
      <textarea [(ngModel)]="blotter.description" name="description"></textarea>

      <!-- BUTTONS -->
      <div class="form-buttons">
        <button type="submit" [disabled]="blotterForm.invalid">
          Save Blotter
        </button>

        <button type="button" (click)="onClose()">
          Cancel
        </button>
      </div>

    </form>

  </div>
</div>
