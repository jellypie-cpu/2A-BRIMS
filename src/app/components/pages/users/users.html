<div class="manage-users-container">
  <h2>Manage Users</h2>

  <p-table [value]="users" [paginator]="true" [rows]="10">
    
    <ng-template pTemplate="header">
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Resident ID</th>
        <th>Action</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
        <td>
  {{ user.role === 'resident' ? user.residentId : '—' }}
</td>
        <td>
          <button pButton 
                  label="Delete" 
                  icon="pi pi-trash"
                  class="p-button-danger"
                  (click)="deleteUser(user.id!)">
          </button>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>
