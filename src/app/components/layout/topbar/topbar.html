<header class="topbar">
  <div class="left">
    <div class="brand-mark">G6</div>
    <div class="brand-text">
      <span>BRIMS</span>
      <small>Barangay Resident's Information Management System</small>
    </div>
  </div>

  <div class="right">
    <button
      type="button"
      class="notification-button"
      [class.has-notifications]="notificationCount > 0"
      (click)="goToNotifications()"
      title="Open notifications"
      aria-label="Open notifications"
    >
      <i class="pi pi-bell"></i>
      <span class="notification-badge" *ngIf="notificationCount > 0">
        {{ notificationCount > 99 ? '99+' : notificationCount }}
      </span>
    </button>

    <div class="user-menu" (click)="toggleDropdown()">
      <img src="bg.png" alt="Profile" class="profile-img" />
      <span class="username">{{ username }}</span>
      <i class="pi pi-chevron-down dropdown-icon"></i>

      <div class="dropdown" *ngIf="showDropdown" (click)="$event.stopPropagation()">
        <button type="button" (click)="goToProfile()">
          <i class="pi pi-user"></i> Profile
        </button>

        <button type="button" (click)="logout()">
          <i class="pi pi-sign-out"></i> Logout
        </button>
      </div>
    </div>
  </div>
</header>
