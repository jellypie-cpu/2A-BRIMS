<header class="topbar">
  <div class="left">
    <img src="vbg.jpg" alt="Logo" class="logo" />

    <span class="title">
      <span class="big">B</span>ARANGGAY
      <span class="big">R</span>ESIDENTS
      <span class="big">I</span>NFORMATION
      <span class="big">M</span>ANAGEMENT
      <span class="big">S</span>YSTEM
    </span>
  </div>

  <div class="notification-box">
  <button type="button" (click)="toggleNotifications()">
    🔔
    <span *ngIf="notificationCount > 0">
      {{ notificationCount }}
    </span>
  </button>

  <div class="notification-dropdown" *ngIf="showNotifications">
    <div *ngIf="notifications.length === 0">
      No new notifications.
    </div>

    <div
      class="notification-item"
      *ngFor="let notification of notifications"
      (click)="markNotificationRead(notification)"
    >
      <strong>{{ notification.title }}</strong>
      <p>{{ notification.message }}</p>
    </div>
  </div>
</div>

  <div class="right">
    <div class="user-menu" (click)="toggleDropdown()">

      <img src="bg.png" alt="Profile" class="profile-img" />
      <span class="username">{{ username }} ▼</span>

      <div class="dropdown" *ngIf="showDropdown">

        <button (click)="goToProfile()">
          <i class="pi pi-user"></i> Profile
        </button>

        <button (click)="logout()">
          <i class="pi pi-sign-out"></i> Logout
        </button>

      </div>

    </div>
  </div>
</header>
