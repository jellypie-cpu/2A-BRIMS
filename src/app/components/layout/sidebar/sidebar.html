<nav [class.collapsed]="isCollapsed" class="sidebar">

  <!-- Logo Section -->
  <div class="sidebar-logo" *ngIf="!isCollapsed">
    <img src="vbg.jpg" alt="Logo" />
  </div>

  <!-- Toggle Button -->
  <button
    pButton
    type="button"
    icon="pi pi-bars"
    class="p-button-text toggle-btn"
    (click)="toggleSidebar()">
  </button>

  <!-- Menu -->
  <ul>
    <li *ngFor="let item of menu" routerLinkActive="active">
      <a [routerLink]="item.routerLink">
        <span class="icon">{{ item.icon }}</span>
        <span class="label" *ngIf="!isCollapsed">{{ item.label }}</span>
      </a>
    </li>
  </ul>
</nav>
